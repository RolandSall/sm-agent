# Project-wide Gradle settings.
#
# The build pins a Java 21 toolchain (see scrum-mcp-server/build.gradle.kts). Gradle auto-detects
# installed JDKs, which is enough on most machines.
#
# If your JDK 21 isn't found — IntelliJ's Gradle sync in particular doesn't always detect JDKs
# installed outside the standard locations — point Gradle at it. Prefer a machine-local override in
# ~/.gradle/gradle.properties (NOT this committed file, whose paths would only be right on one
# machine):
#
#   org.gradle.java.installations.paths=/path/to/jdk-21
#
# Setting JAVA_HOME to a JDK 21 works too.
